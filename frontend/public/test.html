<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sprite Sheet Tester</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
        }

        .controls {
            margin-bottom: 30px;
            background: #2a2a2a;
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            gap: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            align-items: center;
        }

        label {
            display: flex;
            flex-direction: column;
            font-size: 12px;
            color: #aaa;
            gap: 5px;
        }

        input,
        select {
            background: #090909;
            color: white;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            font-family: monospace;
        }

        input:focus,
        select:focus {
            border-color: #0099ff;
        }

        .sprite {
            background-position: 0% 0%;
            image-rendering: pixelated;
            border: 2px dashed #444;
            /* Added a dashed border so you can see the bounding box */
        }
    </style>
</head>

<body>
    <h2>Sprite Tester Tool</h2>
    <div class="controls">
        <label>
            Image File
            <select id="fileSelect">
                <option value="database_test.png">database_test.png</option>
                <option value="orchestrator_test.png">orchestrator_test.png</option>
                <option value="backend_test.png">backend_test.png</option>
                <option value="frontend_test.png">frontend_test.png</option>
                <option value="validator_test.png">validator_test.png</option>
                <option value="agents.png">agents.png</option>
                <option value="sprite_sheet_192_5px.png">sprite_sheet_192_5px.png</option>
            </select>
        </label>
        <label>
            Columns
            <input type="number" id="cols" value="4" min="1">
        </label>
        <label>
            Rows
            <input type="number" id="rows" value="4" min="1">
        </label>
        <label>
            Speed (ms)
            <input type="number" id="speed" value="50" min="10" step="10">
        </label>
    </div>

    <div class="sprite" id="anim"></div>
    <p style="color: #666; margin-top: 20px;">Adjust the Columns and Rows until the animation frames fit cleanly inside
        the dashed box!</p>

    <script>
        const sprite = document.getElementById('anim');
        const fileSelect = document.getElementById('fileSelect');
        const colsInput = document.getElementById('cols');
        const rowsInput = document.getElementById('rows');
        const speedInput = document.getElementById('speed');

        let intervalId;
        const img = new Image();

        function updateAnimation() {
            clearInterval(intervalId);

            const cols = parseInt(colsInput.value) || 1;
            const rows = parseInt(rowsInput.value) || 1;
            const speed = parseInt(speedInput.value) || 50;
            const src = fileSelect.value;

            img.src = src;
            sprite.style.backgroundImage = `url('${src}')`;

            img.onload = () => {
                sprite.style.backgroundSize = `${cols * 100}% ${rows * 100}%`;
                sprite.style.width = (img.width / cols) + 'px';
                sprite.style.height = (img.height / rows) + 'px';

                let currentFrame = 0;
                const totalFrames = cols * rows;

                intervalId = setInterval(() => {
                    currentFrame = (currentFrame + 1) % totalFrames;
                    const x = currentFrame % cols;
                    const y = Math.floor(currentFrame / cols);

                    const xPos = cols > 1 ? x * (100 / (cols - 1)) : 0;
                    const yPos = rows > 1 ? y * (100 / (rows - 1)) : 0;

                    sprite.style.backgroundPosition = `${xPos}% ${yPos}%`;
                }, speed);
            };
        }

        fileSelect.addEventListener('change', updateAnimation);
        colsInput.addEventListener('change', updateAnimation);
        rowsInput.addEventListener('change', updateAnimation);
        speedInput.addEventListener('change', updateAnimation);

        updateAnimation();
    </script>
</body>

</html>
